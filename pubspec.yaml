name: voicehub
description: Voice-enabled AI assistant powered by OpenClaw
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # HTTP & WebSocket
  dio: ^5.3.3
  web_socket_channel: ^2.4.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Audio
  record: ^5.0.4
  flutter_tts: ^3.8.5
  audioplayers: ^5.2.1
  
  # Speech Recognition
  speech_to_text: ^6.3.0
  
  # Utils
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
